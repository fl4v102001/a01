<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>MCP Agent Chat</title>
</head>
<body>
    <h1>Agente MCP - Gemini</h1>
    
    <div>
        <textarea id="prompt" rows="5" cols="60" placeholder="Digite seu prompt ou comando aqui..."></textarea>
    </div>
    
    <button id="sendBtn">Enviar via Agente</button>
    
    <h2>Resultado:</h2>
    <div>
        <textarea id="result" rows="5" cols="60" readonly placeholder="O resultado aparecerá aqui..."></textarea>
    </div>

    <script>
        const btn = document.getElementById('sendBtn');
        const promptEl = document.getElementById('prompt');
        const resultEl = document.getElementById('result');

        btn.addEventListener('click', async () => {
            const prompt = promptEl.value.trim();
            if (!prompt) return;

            btn.disabled = true;
            resultEl.value = "Pensando e executando MCP...";

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });
                
                // Prepara a leitura do Stream de texto
                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                resultEl.value = ""; // Limpa a mensagem de "Pensando..."

                // Loop para ler os pedaços (chunks) conforme chegam do servidor
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    // Decodifica o pedaço recebido e anexa ao textarea
                    const chunk = decoder.decode(value, { stream: true });
                    resultEl.value += chunk;
                    
                    // Auto-scroll para manter o final do texto sempre visível
                    resultEl.scrollTop = resultEl.scrollHeight;
                }
            } catch (err) {
                resultEl.value = "Erro de conexão com o agente.";
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
