<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>MCP Agent Chat</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; color: #333; }
        #prompt, #result {
            width: 100%;
            max-width: 800px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 16px;
            font-size: 14px;
        }
        #result {
            height: 400px;
            overflow-y: auto;
            background-color: #f8f9fa;
            line-height: 1.6;
        }
        #result pre { background: #282c34; color: #abb2bf; padding: 12px; border-radius: 6px; overflow-x: auto; }
        #result code { font-family: monospace; background: #e9ecef; padding: 2px 4px; border-radius: 4px; }
        #result pre code { background: transparent; padding: 0; }
        button { margin-top: 12px; padding: 10px 20px; font-weight: 600; cursor: pointer; background: #007bff; color: #fff; border: none; border-radius: 6px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1>Agente MCP - Gemini</h1>
    
    <div>
        <textarea id="prompt" rows="5" cols="60" placeholder="Digite seu prompt ou comando aqui..."></textarea>
    </div>
    
    <button id="sendBtn">Enviar via Agente</button>
    
    <h2>Resultado:</h2>
    <div>
        <div id="result">O resultado aparecerá aqui...</div>
    </div>

    <script>
        const btn = document.getElementById('sendBtn');
        const promptEl = document.getElementById('prompt');
        const resultEl = document.getElementById('result');

        btn.addEventListener('click', async () => {
            const prompt = promptEl.value.trim();
            if (!prompt) return;

            btn.disabled = true;
            resultEl.innerHTML = "<em>Pensando e executando MCP...</em>";
            let fullText = "";

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });
                
                // Prepara a leitura do Stream de texto
                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                resultEl.innerHTML = ""; // Limpa a mensagem de "Pensando..."

                // Loop para ler os pedaços (chunks) conforme chegam do servidor
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    // Decodifica o pedaço recebido, acumula e injeta o HTML diretamente
                    const chunk = decoder.decode(value, { stream: true });
                    fullText += chunk;
                    resultEl.innerHTML = fullText;
                    
                    // Auto-scroll para manter o final do texto sempre visível
                    resultEl.scrollTop = resultEl.scrollHeight;
                }
            } catch (err) {
                resultEl.innerHTML = "<span style='color:red;'>Erro de conexão com o agente.</span>";
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
